name: Eval Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      qdrant:
        image: qdrant/qdrant
        ports:
          - 6333:6333

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for Qdrant to be ready
        run: |
          for i in {1..15}; do
            curl -sf http://localhost:6333/healthz && break
            echo "Waiting for Qdrant... ($i)"
            sleep 3
          done

      - name: Seed knowledge base
        env:
          GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY:  ${{ secrets.TAVILY_API_KEY }}
          GROQ_MODEL:      llama-3.3-70b-versatile
          QDRANT_HOST:     localhost
          QDRANT_PORT:     6333
          COLLECTION_NAME: math_knowledge
          CONFIDENCE_THRESHOLD: "0.75"
        run: python seed_knowledge.py

      - name: Run evaluation (20 questions for CI speed)
        env:
          GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY:  ${{ secrets.TAVILY_API_KEY }}
          GROQ_MODEL:      llama-3.3-70b-versatile
          QDRANT_HOST:     localhost
          QDRANT_PORT:     6333
          COLLECTION_NAME: math_knowledge
          CONFIDENCE_THRESHOLD: "0.75"
        run: python eval/run_eval.py --limit 20 --output eval/ci_results.json

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: eval/ci_results.json